  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nt 0 31px, oklch(0.88 0.015 80 / 0.35) 31px 32px);\n  background-blend-mode: multiply;\n}\n\n/* ============ Top bar ============ */\n.topbar {\n  border-bottom: 1px solid var(--rule-strong);\n  background: var(--paper);\n  position: sticky; top: 0; z-index: 40;\n}\n.topbar-inner {\n  max-width: 1280px; margin: 0 auto;\n  padding: 14px 28px;\n  display: flex; align-items: center; gap: 20px;\n}\n.brand {\n  display: flex; align-items: center; gap: 12px;\n  text-decoration: none; color: var(--ink);\n}\n.brand-logo {\n  height: 28px;\n  width: auto;\n  display: block;\n}\n.brand-sep {\n  width: 1px; height: 22px;\n  background: var(--rule-strong);\n}\n.brand-name {\n  font-family: var(--f-serif);\n  font-size: 20px;\n  letter-spacing: -0.01em;\n  color: var(--ink-2);\n}\n.brand-name em {\n  font-style: italic;\n}\n.topnav {\n  margin-left: auto;\n  display: flex; align-items: center; gap: 22px;\n  font-size: 14px;\n}\n.topnav a {\n  color: var(--ink-2);\n  text-decoration: none;\n  padding: 4px 0;\n  border-bottom: 1px solid transparent;\n}\n.topnav a:hover { color: var(--ink); border-bottom-color: var(--ink); }\n.topnav a.active { color: var(--ink); border-bottom-color: var(--ink); }\n.btn-primary {\n  background: var(--brand);\n  color: #fff;\n  padding: 8px 16px;\n  font-size: 13px;\n  font-weight: 500;\n  border: 1px solid var(--brand);\n  cursor: pointer;\n  text-decoration: none;\n  display: inline-block;\n  letter-spacing: 0.01em;\n  transition: background 0.15s, border-color 0.15s;\n}\n.btn-primary:hover { background: var(--brand-deep); border-color: var(--brand-deep); }\n\n/* ============ Page wrapper ============ */\n.page {\n  max-width: 1280px;\n  margin: 0 auto;\n  padding: 0 28px;\n}\n.tool-page {\n  display: grid;\n  grid-template-columns: 280px 1fr;\n  gap: 0;\n  min-height: calc(100vh - 58px);\n}\n@media (max-width: 900px) {\n  .tool-page { grid-template-columns: 1fr; }\n}\n\n/* Marginalia / guidance column */\n.margin-col {\n  border-right: 1px solid r(--ink-blue); background: oklch(0.94 0.03 250); }\n  .cat-chip.puzz { color: var(--amber); border-color: var(--amber); background: var(--amber-soft); }\n  .cat-chip.dog  { color: var(--terra); border-color: var(--terra); background: var(--terra-soft); }\n\n  /* Chart */\n  .chart-panel {\n    border: 1px solid var(--rule-strong);\n    background: var(--paper);\n    position: sticky; top: 80px;\n  }\n  .chart-head {\n    padding: 16px 18px;\n    border-bottom: 1px solid var(--rule);\n    background: var(--paper-2);\n  }\n  .chart-head h3 {\n    font-family: var(--f-serif); font-weight: 400;\n    font-size: 22px; margin: 0; letter-spacing: -0.01em;\n  }\n  .chart-head h3 em { color: var(--ink-2); font-style: italic; }\n  .chart-head p {\n    font-family: var(--f-mono); font-size: 10px;\n    letter-spacing: 0.1em; text-transform: uppercase;\n    color: var(--ink-3); margin: 6px 0 0 0;\n  }\n\n  .chart-wrap { padding: 20px 24px 16px; }\n  .chart {\n    position: relative;\n    aspect-ratio: 1 / 1;\n    border: 1px solid var(--rule-strong);\n    background:\n      linear-gradient(to right, transparent 49.8%, var(--rule-strong) 49.8%, var(--rule-strong) 50.2%, transparent 50.2%),\n      linear-gradient(to bottom, transparent 49.8%, var(--rule-strong) 49.8%, var(--rule-strong) 50.2%, transparent 50.2%),\n      repeating-linear-gradient(0deg, transparent 0 9.9%, oklch(0.92 0.01 80 / 0.4) 9.9%, oklch(0.92 0.01 80 / 0.4) 10.1%, transparent 10.1%),\n      repeating-linear-gradient(90deg, transparent 0 9.9%, oklch(0.92 0.01 80 / 0.4) 9.9%, oklch(0.92 0.01 80 / 0.4) 10.1%, transparent 10.1%);\n  }\n  /* quadrant labels */\n  .q-label {\n    position: absolute;\n    font-family: var(--f-mono);\n    font-size: 10px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--ink-3);\n    padding: 8px 10px;\n  }\n  .q-label strong {\n    display: block;\n    font-family: var(--f-serif);\n    font-weight: 400;\n    font-size: 18px;\n    letter-spacing: -0.005em;\n    text-transform: none;\n    margin-top: 2px;\n    color: var(--ink);\n  }\n  .q-star { top: 6px; right: 6px; text-align: right; }\n  .q-star strong { color: var(--green); }\n  .q-puzz { top: 6px; left: 6px; }\n  .q-puzz strong { color: var(--amber); }\n  .q-plow { bottom: 6px; right: 6px; text-align: right; }\n  .q-plow strong { color: var(--ink-blue); }\n  .q-dog  { bottom: 6px; left: 6px; }\n  .q-dog  strong { color: var(--terra); }\n\n  .dot {\n    position: absolute;\n    width: 14px; height: 14px;\n    border-radius: 50%;\n    transform: translate(-50%, 50%);\n    border: 1.5px solid var(--paper);\n    cursor: pointer;\n    transition: transform 0.12s;\n    box-shadow: 0 0 0 1px oklch(0.22 0.015 255 / 0.3);\n  }\n  .dot:hover { transform: translate(-50%, 50%) scale(1.3); z-index: 4; }\n  .dot.star { background: var(--green); }\n  .dot.plow { background: var(--ink-blue); }\n  .dot.puzz { background: var(--amber); }\n  .dot.dog  { background: var(--terra); }\n  .dot-lbl {\n    position: absolute;\n    font-family: var(--f-mono); font-size: 10px;\n    color: var(--ink-2);\n    white-space: nowrap;\n    transform: translate(-50%, -150%);\n    pointer-events: none;\n    background: oklch(0.98 0.005 85 / 0.85);\n    padding: 1px 4px;\n  }\n\n  /* Axis ticks */\n  .axis-x, .axis-y {\n    position: absolute;\n    font-family: var(--f-mono); font-size: 10px;\n    letter-spacing: 0.08em; text-transform: uppercase;\n    color: var(--ink-3);\n  }\n  .axis-x { bottom: -24px; left: 0; right: 0; display: flex; justify-content: space-between; }\n  .axis-y { top: 0; bottom: 0; left: -6px; display: flex; flex-direction: column; justify-content: space-between; transform: translateX(-100%); align-items: flex-end; padding-right: 8px; text-align: right; }\n  .axis-title {\n    font-family: var(--f-mono); font-size: 10px;\n    letter-spacing: 0.14em; text-transform: uppercase;\n    color: var(--ink-2); text-align: center;\n  }\n\n  .legend-chart {\n    display: flex; gap: 14px;\n    padding: 12px 20px 18px;\n    border-top: 1px solid var(--rule);\n    flex-wrap: wrap;\n    font-size: 12px;\n  }\n  .legend-chart .lg { display: flex; align-items: center; gap: 6px; color: var(--ink-2); }\n  .legend-chart .lg .d { width: 10px; height: 10px; border-radius: 50%; }\n  .lg .d.star { background: var(--green); }\n  .lg .d.plow { background: var(--ink-blue); }\n  .lg .d.puzz { background: var(--amber); }\n  .lg .d.dog  { background: var(--terra); }\n\n  /* Summary */\n  .me-summary {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 0;\n    border: 1px solid var(--rule-strong);\n    margin-top: 28px;\n  }\n  @media (max-width: 700px) { .me-summary { grid-template-columns: repeat(2, 1fr); } }\n  .me-sum {\n    padding: 14px 16px;\n    border-right: 1px solid var(--rule);\n  }\n  .me-sum:last-child { border-right: none; }\n  .me-sum .k {\n    font-family: var(--f-mono); font-size: 10px;\n    letter-spacing: 0.1em; text-transform: uppercase;\n    color: var(--ink-3);\n    display: flex; align-items: center; gap: 6px;\n  }\n  .me-sum .k .d { width: 8px; height: 8px; border-radius: 50%; }\n  .me-sum .v {\n    font-family: var(--f-serif); font-size: 28px;\n    margin-top: 4px; font-variant-numeric: tabular-nums;\n  }\n  .me-sum .sub { font-family: var(--f-mono); font-size: 10px; color: var(--ink-3); margin-top: 2px; }\n<\u002Fstyle>\n\n<\u002Fhead>\n<body class=\"ledger\">\n<script src=\"4142ffb4-f040-480a-910e-8f12deb7320b\"><\u002Fscript>\n<script>SYN.mountTopbar('menu');<\u002Fscript>\n\n<main class=\"page\">\n  <div class=\"tool-page\">\n    <aside class=\"margin-col\">\n      <div class=\"eyebrow\">Tool 05 · Strategy<\u002Fdiv>\n      <h1>Menu <em>engineering.<\u002Fem><\u002Fh1>\n      <p class=\"lede\">Plot every dish on popularity × profitability. See at a glance which dishes to promote, reprice, reposition or cut. Based on the classic <strong>Kasavana &amp; Smith<\u002Fstrong> matrix.<\u002Fp>\n\n      <div class=\"margin-note\">\n        <strong>Stars<\u002Fstrong>\n        High popularity, high margin. <em>Protect and feature.<\u002Fem> Top spot on the menu, name them well.\n      <\u002Fdiv>\n      <div class=\"margin-note\">\n        <strong>Plowhorses<\u002Fstrong>\n        High popularity, low margin. <em>Reprice or recost.<\u002Fem> A 50¢ bump on a 200-cover dish is real money.\n      <\u002Fdiv>\n      <div class=\"margin-note\">\n        <strong>Puzzles<\u002Fstrong>\n        Low popularity, high margin. <em>Reposition or retrain staff.<\u002Fem> Often need better description or server recommendation.\n      <\u002Fdiv>\n      <div class=\"margin-note\">\n        <strong>Dogs<\u002Fstrong>\n        Low popularity, low margin. <em>Replace.<\u002Fem> They dilute attention; cut with confidence once proven.\n      <\u002Fdiv>\n    <\u002Faside>\n\n    <section class=\"workspace\">\n      <div class=\"workspace-header\">\n        <div class=\"workspace-title\">Worksheet · Menu analysis<\u002Fdiv>\n        <div class=\"ws-actions\">\n          <button class=\"btn-ghost\" onclick=\"window.print()\">⎙ Print<\u002Fbutton>\n          <button class=\"btn-ghost\" onclick=\"SYN.openLead({reason:'export'})\">✉ Email PDF<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"me-layout\">\n        <div>\n          <table class=\"me-table\" id=\"menu\">\n            <thead>\n              <tr>\n                <th>Dish<\u002Fth>\n                <th class=\"num\" style=\"width:80px;\">Sold<\u002Fth>\n                <th class=\"num\" style=\"width:90px;\">Cost €<\u002Fth>\n                <th class=\"num\" style=\"width:90px;\">Price €<\u002Fth>\n                <th class=\"num\" style=\"width:90px;\">GP €<\u002Fth>\n                <th class=\"num\" style=\"width:80px;\">GP %<\u002Fth>\n                <th style=\"width:110px;\">Category<\u002Fth>\n                <th style=\"width:44px;\"><\u002Fth>\n              <\u002Ftr>\n            <\u002Fthead>\n            <tbody><\u002Ftbody>\n          <\u002Ftable>\n          <button class=\"add-row-btn\" id=\"add-dish\">+ Add dish<\u002Fbutton>\n\n          <div class=\"me-summary\" id=\"summary\"><\u002Fdiv>\n\n          <div style=\"margin-top:40px; padding-top: 20px; border-top: 1px solid var(--rule); display:flex; justify-content:space-between; color: var(--ink-3); font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.08em;\">\n            <span>Generated with Synergy Toolkit · synergystocktaking.ie<\u002Fspan>\n            <span id=\"timestamp\"><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <aside class=\"chart-panel\">\n          <div class=\"chart-head\">\n            <h3>The matrix <em>— your dishes plotted.<\u002Fem><\u002Fh3>\n            <p>Axis thresholds: menu averages<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"chart-wrap\">\n            <div style=\"padding-left: 28px;\">\n              <div class=\"axis-title\" style=\"margin-bottom: 4px;\">Popularity (covers) →<\u002Fdiv>\n              <div style=\"position: relative;\">\n                <div class=\"axis-y\"><span>High GP<\u002Fspan><span>avg<\u002Fspan><span>Low GP<\u002Fspan><\u002Fdiv>\n                <div class=\"chart\" id=\"chart\">\n                  <div class=\"q-label q-puzz\">Low popularity<strong>Puzzles<\u002Fstrong><\u002Fdiv>\n                  <div class=\"q-label q-star\">High popularity<strong>Stars<\u002Fstrong><\u002Fdiv>\n                  <div class=\"q-label q-dog\">Low popularity<strong>Dogs<\u002Fstrong><\u002Fdiv>\n                  <div class=\"q-label q-plow\">High popularity<strong>Plowhorses<\u002Fstrong><\u002Fdiv>\n                  <div class=\"axis-x\"><span>Low<\u002Fspan><span>avg<\u002Fspan><span>High<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"axis-title\" style=\"margin-top: 28px;\">← Profitability (GP per dish)<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"legend-chart\">\n            <span class=\"lg\"><span class=\"d star\"><\u002Fspan>Star<\u002Fspan>\n            <span class=\"lg\"><span class=\"d plow\"><\u002Fspan>Plowhorse<\u002Fspan>\n            <span class=\"lg\"><span class=\"d puzz\"><\u002Fspan>Puzzle<\u002Fspan>\n            <span class=\"lg\"><span class=\"d dog\"><\u002Fspan>Dog<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Faside>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n<\u002Fmain>\n\n<script>\n  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n    \"targetGP\": 70\n  }/*EDITMODE-END*/;\n  let settings = { ...TWEAK_DEFAULTS };\n\n  let menu = [\n    { name: 'Beef & Guinness pie', sold: 180, cost: 4.80, price: 18.50 },\n    { name: 'Pan-fried hake', sold: 95,  cost: 3.42, price: 24.50 },\n    { name: 'Seafood chowder', sold: 240, cost: 2.20, price: 9.50 },\n    { name: 'Caesar salad', sold: 75,  cost: 2.10, price: 12.00 },\n    { name: 'Steak sandwich', sold: 160, cost: 5.40, price: 16.50 },\n    { name: 'Mushroom risotto', sold: 42,  cost: 2.80, price: 17.50 },\n    { name: 'Sticky toffee pud', sold: 130, cost: 1.75, price: 8.50 },\n    { name: 'Cheese board', sold: 28,  cost: 5.20, price: 14.00 },\n    { name: 'Pint of stout', sold: 620, cost: 2.15, price: 6.20 },\n    { name: 'Irish coffee', sold: 88,  cost: 2.00, price: 8.50 }\n  ];\n\n  const categorise = (gp, sold, avgGP, avgSold) => {\n    const highGP = gp >= avgGP;\n    const highSold = sold >= avgSold;\n    if (highGP && highSold) return 'star';\n    if (highGP && !highSold) return 'puzz';\n    if (!highGP && highSold) return 'plow';\n    return 'dog';\n  };\n\n  const CAT_LABEL = { star: 'Star', plow: 'Plowhorse', puzz: 'Puzzle', dog: 'Dog' };\n\n  const render = () => {\n    // Compute averages\n    const rows = menu.map(m => {\n      const gp = (m.price || 0) - (m.cost || 0);\n      const gpPct = m.price > 0 ? (gp / m.price) * 100 : 0;\n      return { ...m, gp, gpPct };\n    });\n    const avgGP = rows.length ? rows.reduce((s, r) => s + r.gp, 0) / rows.length : 0;\n    const avgSold = rows.length ? rows.reduce((s, r) => s + (r.sold || 0), 0) / rows.length : 0;\n    rows.forEach(r => r.cat = categorise(r.gp, r.sold || 0, avgGP, avgSold));\n\n    // Table\n    const tbody = document.querySelector('#menu tbody');\n    tbody.innerHTML = '';\n    rows.forEach((r, i) => {\n      const tr = document.createElement('tr');\n      tr.innerHTML = `\n        <td><input type=\"text\" data-f=\"name\" data-i=\"${i}\" value=\"${(r.name||'').replace(/\"/g,'&quot;')}\" placeholder=\"Dish\"/><\u002Ftd>\n        <td><input type=\"number\" class=\"num\" data-f=\"sold\" data-i=\"${i}\" value=\"${r.sold}\" step=\"1\" min=\"0\"/><\u002Ftd>\n        <td><input type=\"number\" class=\"num\" data-f=\"cost\" data-i=\"${i}\" value=\"${r.cost}\" step=\"0.01\" min=\"0\"/><\u002Ftd>\n        <td><input type=\"number\" class=\"num\" data-f=\"price\" data-i=\"${i}\" value=\"${r.price}\" step=\"0.01\" min=\"0\"/><\u002Ftd>\n        <td class=\"me-computed\">${SYN.fmtEUR(r.gp)}<\u002Ftd>\n        <td class=\"me-computed\">${SYN.fmtPct(r.gpPct, 1)}<\u002Ftd>\n        <td style=\"padding: 8px;\"><span class=\"cat-chip ${r.cat}\">${CAT_LABEL[r.cat]}<\u002Fspan><\u002Ftd>\n        <td style=\"text-align:center;\"><button class=\"del-row\" data-del=\"${i}\">×<\u002Fbutton><\u002Ftd>\n      `;\n      tbody.appendChild(tr);\n    });\n    tbody.querySelectorAll('input').forEach(el => {\n      el.addEventListener('input', () => {\n        const i = +el.dataset.i, f = el.dataset.f;\n        menu[i][f] = f === 'name' ? el.value : (parseFloat(el.value) || 0);\n        render();\n      });\n    });\n    tbody.querySelectorAll('[data-del]').forEach(b => {\n      b.addEventListener('click', () => { menu.splice(+b.dataset.del, 1); render(); });\n    });\n\n    // Chart\n    const chart = document.getElementById('chart');\n    // Clear old dots\n    chart.querySelectorAll('.dot, .dot-lbl').forEach(n => n.remove());\n    // Scale: dynamic based on max\n    const maxSold = Math.max(1, ...rows.map(r => r.sold || 0));\n    const maxGP = Math.max(0.5, ...rows.map(r => r.gp));\n    const minGP = Math.min(0, ...rows.map(r => r.gp));\n    const gpRange = maxGP - minGP || 1;\n\n    rows.forEach(r => {\n      const xPct = ((r.sold || 0) / maxSold) * 94 + 3; // 3–97%\n      const yPct = ((r.gp - minGP) / gpRange) * 94 + 3; // 3–97%\n      const dot = document.createElement('div');\n      dot.className = 'dot ' + r.cat;\n      dot.style.left = xPct + '%';\n      dot.style.bottom = yPct + '%';\n      dot.title = `${r.name} — ${r.sold} sold · GP €${r.gp.toFixed(2)} (${r.gpPct.toFixed(1)}%)`;\n      chart.appendChild(dot);\n\n      const lbl = document.createElement('div');\n      lbl.className = 'dot-lbl';\n      lbl.textContent = r.name.length > 18 ? r.name.slice(0, 16) + '…' : r.name;\n      lbl.style.left = xPct + '%';\n      lbl.style.bottom = yPct + '%';\n      chart.appendChild(lbl);\n    });\n\n    // Summary\n    const sum = document.getElementById('summary');\n    const counts = { star: 0, plow: 0, puzz: 0, dog: 0 };\n    rows.forEach(r => counts[r.cat]++);\n    const totalRev = rows.reduce((s, r) => s + (r.sold || 0) * (r.price || 0), 0);\n    const totalGPsum = rows.reduce((s, r) => s + (r.sold || 0) * r.gp, 0);\n\n    sum.innerHTML = `\n      <div class=\"me-sum\"><div class=\"k\"><span class=\"d\" style=\"background: var(--green)\"><\u002Fspan>Stars<\u002Fdiv><div class=\"v\" style=\"color: var(--green)\">${counts.star}<\u002Fdiv><div class=\"sub\">Feature & protect<\u002Fdiv><\u002Fdiv>\n      <div class=\"me-sum\"><div class=\"k\"><span class=\"d\" style=\"background: var(--ink-blue)\"><\u002Fspan>Plowhorses<\u002Fdiv><div class=\"v\" style=\"color: var(--ink-blue)\">${counts.plow}<\u002Fdiv><div class=\"sub\">Reprice or recost<\u002Fdiv><\u002Fdiv>\n      <div class=\"me-sum\"><div class=\"k\"><span class=\"d\" style=\"background: var(--amber)\"><\u002Fspan>Puzzles<\u002Fdiv><div class=\"v\" style=\"color: var(--amber)\">${counts.puzz}<\u002Fdiv><div class=\"sub\">Reposition<\u002Fdiv><\u002Fdiv>\n      <div class=\"me-sum\"><div class=\"k\"><span class=\"d\" style=\"background: var(--terra)\"><\u002Fspan>Dogs<\u002Fdiv><div class=\"v\" style=\"color: var(--terra)\">${counts.dog}<\u002Fdiv><div class=\"sub\">Replace<\u002Fdiv><\u002Fdiv>\n    `;\n\n    // Update chart subtitle\n    document.querySelector('.chart-head p').textContent = `Menu avg · ${avgSold.toFixed(0)} sold · €${avgGP.toFixed(2)} GP · €${totalGPsum.toFixed(0)} total GP`;\n  };\n\n  document.getElementById('add-dish').addEventListener('click', () => {\n    menu.push({ name: '', sold: 0, cost: 0, price: 0 });\n    render();\n    const n = document.querySelectorAll('#menu tbody [data-f=\"name\"]');\n    n[n.length - 1].focus();\n  });\n\n  document.getElementById('timestamp').textContent = 'Worksheet · ' + new Date().toLocaleDateString('en-IE', { year:'numeric', month:'short', day:'numeric' });\n\n  render();\n\n  SYN.mountTweaks({\n    rows: [\n      { type: 'slider', key: 'targetGP', label: 'Target GP%', value: settings.targetGP, min: 40, max: 90, step: 1,\n        format: v => v + '%',\n        onChange: v => { settings.targetGP = v; render(); } }\n    ]\n  });\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
