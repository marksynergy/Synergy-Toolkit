  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

mat('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* Paper + ink */\n  --paper: oklch(0.985 0.004 85);\n  --paper-2: oklch(0.965 0.006 85);\n  --paper-3: oklch(0.935 0.008 85);\n  --rule: oklch(0.86 0.01 80);\n  --rule-strong: oklch(0.72 0.015 80);\n  --ink: oklch(0.22 0.015 255);\n  --ink-2: oklch(0.38 0.015 255);\n  --ink-3: oklch(0.55 0.015 255);\n\n  /* Brand: Synergy crimson + amber */\n  --brand: #C8102E;\n  --brand-deep: #A00C24;\n  --brand-soft: oklch(0.94 0.04 25);\n  --amber: #F39C1F;\n  --amber-soft: oklch(0.95 0.06 75);\n  --amber-deep: #D07A0D;\n\n  /* Semantic (mapped to brand where appropriate) */\n  --green: oklch(0.52 0.1 150);\n  --green-soft: oklch(0.93 0.04 150);\n  --terra: #C8102E;\n  --terra-soft: oklch(0.94 0.04 25);\n  --ink-blue: oklch(0.42 0.09 250);\n\n  /* Type */\n  --f-sans: 'DM Sans', 'Wix Madefor Display', ui-sans-serif, system-ui, -apple-system, Helvetica, Arial, sans-serif;\n  --f-serif: 'Instrument Serif', 'Times New Roman', Georgia, serif;\n  --f-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;\n\n  /* Spacing */\n  --r-1: 2px;\n  --r-2: 4px;\n  --r-3: 6px;\n}\n\n* { box-sizing: border-box; }\n\nhtml, body {\n  margin: 0;\n  padding: 0;\n  background: var(--paper);\n  color: var(--ink);\n  font-family: var(--f-sans);\n  font-size: 15px;\n  line-height: 1.45;\n  -webkit-font-smoothing: antialiased;\n}\n\n/* Subtle ledger texture on body */\nbody.ledger {\n  background:\n    linear-gradient(var(--paper) 0 0),\n    repeating-linear-gradient(0deg, transparent 0 31px, oklch(0.88 0.015 80 / 0.35) 31px 32px);\n  background-blend-mode: multiply;\n}\n\n/* ============ Top bar ============ */\n.topbar {\n  border-bottom: 1px solid var(--rule-strong);\n  background: var(--paper);\n  position: sticky; top: 0; z-index: 40;\n}\n.topbar-inner {\n  max-width: 1280px; margin: 0 auto;\n  padding: 14px 28px;\n  display: flex; align-items: center; gap: 20px;\n}\n.brand {\n  display: flex; align-items: center; gap: 12px;\n  text-decoration: none; color: var(--ink);\n}\n.brand-logo {\n  height: 28px;\n  width: auto;\n  display: block;\n}\n.brand-sep {\n  width: 1px; height: 22px;\n  background: var(--rule-strong);\n}\n.brand-name {\n  font-family: var(--f-serif);\n  font-size: 20px;\n  letter-spacing: -0.01em;\n  color: var(--ink-2);\n}\n.brand-name em {\n  font-style: italic;\n}\n.topnav {\n  margin-left: auto;\n  display: flex; align-items: center; gap: 22px;\n  font-size: 14px;\n}\n.topnav a {\n  color: var(--ink-2);\n  text-decoration: none;\n  padding: 4px 0;\n  border-bottom: 1px solid transparent;\n}\n.topnav a:hover { color: var(--ink); border-bottom-color: var(--ink); }\n.topnav a.active { color: var(--ink); border-bottom-color: var(--ink); }\n.btn-primary {\n  background: var(--brand);\n  color: #fff;\n  padding: 8px 16px;\n  font-size: 13px;\n  font-weight: 500;\n  border: 1px solid var(--brand);\n  cursor: pointer;\n  text-decoration: none;\n  display: inline-block;\n  letter-spacing: 0.01em;\n  transition: background 0.15s, border-color 0.15s;\n}\n.btn-primary:hover { background: var(--brand-deep); border-color: var(--brand-deep); }\n\n/* ============ Page wrapper ============ */\n.page {\n  max-width: 1280px;\n  margin: 0 auto;\n  padding: 0 28px;\n}\n.tool-page {\n  display: grid;\n  grid-template-columns: 280px 1fr;\n  gap: 0;\n  min-height: calc(100vh - 58px);\n}\n@media (max-width: 900px) {\n  .tool-page { grid-template-columns: 1fr; }\n}\n\n/* Marginalia / guidance column */\n.margin-col {\n  border-right: 1px solid var(--rule);\n  padding: 36px 28px 36px 0;\n}\n@media (max-width: 900px) {\n  .margin-col { border-right: none; border-bottom: 1px solid var(--rule); padding: 28px; }\n}\n.margin-col .eyebrow {\n  font-family: var(--f-mono);\n  font-size: 10px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n  margin-bottom: 10px;\n}\n.margin-col h1 {\n  font-family: var(--f-serif);\n  font-weight: 400;\n  font-size: 36px;\n  line-height: 1.05;\n  letter-spacing: -0.015em;\n  margin: 0 0 14px 0;\n}\n.margin-col h1 em { font-style: italic; color: var(--brand); }\n.margin-col p.lede {\n  color: var(--ink-2);\n  font-size: 14px;\n  margin: 0 0 28px 0;\n}\n.margin-note {\n  border-top: 1px solid var(--rule);\n  padding: 14px 0;\n  font-size: 13px;\n  color: var(--ink-2);\n}\n.margin-note strong {\n  display: block;\n  font-weight: 600;\n  color: var(--ink);\n  font-size: 12px;\n  text-transform: uppercase;\n  letter-spacing: 0.06em;\n  margin-bottom: 4px;\n  font-family: var(--f-mono);\n}\n\n/* Workspace / main content */\n.workspace {\n  padding: 36px 0 36px 28px;\n}\n@media (max-width: 900px) {\n  .workspace { padding: 28px; }\n}\n.workspace-header {\n  display: flex;\n  align-items: flex-end;\n  justify-content: space-between;\n  border-bottom: 1px solid var(--rule-strong);\n  padding-bottom: 10px;\n  margin-bottom: 24px;\n}\n.workspace-title {\n  font-family: var(--f-mono);\n  font-size: 11px;\n  letter-spacing: 0.16em;\n  text-transform: uppercase;\n  color: var(--ink-2);\n}\n.ws-actions { display: flex; gap: 8px; }\n\n.btn-ghost {\n  background: transparent;\n  border: 1px solid var(--rule-strong);\n  color: var(--ink);\n  padding: 6px 12px;\n  font-size: 12px;\n  font-family: var(--f-sans);\n  cursor: pointer;\n  letter-spacing: 0.02em;\n  display: inline-flex; align-items: center; gap: 6px;\n}\n.btn-ghost:hover { background: var(--paper-2); border-color: var(--ink); }\n\n/* ============ Data table / ledger ============ */\n.ledger-table {\n  width: 100%;\n  border-collapse: collapse;\n  font-size: 14px;\n}\n.ledger-table th {\n  font-family: var(--f-mono);\n  font-weight: 500;\n  font-size: 10px;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n  text-align: left;\n  padding: 8px 10px;\n  border-bottom: 1px solid var(--rule-strong);\n  background: var(--paper);\n  position: sticky; top: 58px;\n  vertical-align: bottom;\n}\n.ledger-table td {\n  padding: 0;\n  border-bottom: 1px solid var(--rule);\n  vertical-align: middle;\n}\n.ledger-table tr:hover td { background: oklch(0.97 0.01 85 / 0.5); }\n.ledger-table .num, .num {\n  font-family: var(--f-mono);\n  font-variant-numeric: tabular-nums;\n  text-align: right;\n}\n.ledger-table input, .ledger-table select {\n  width: 100%;\n  border: 0;\n  background: transparent;\n  padding: 10px;\n  font: inherit;\n  color: var(--ink);\n  outline: none;\n}\n.ledger-table input.num {\n  font-family: var(--f-mono);\n  font-variant-numeric: tabular-nums;\n  text-align: right;\n}\n.ledger-table input:focus, .ledger-table select:focus {\n  background: oklch(0.98 0.03 90);\n  box-shadow: inset 0 -2px 0 var(--ink);\n}\n.ledger-table tfoot td {\n  border-top: 2px solid var(--ink);\n  border-bottom: none;\n  padding: 12px 10px;\n  font-family: var(--f-mono);\n  font-variant-numeric: tabular-nums;\n  font-weight: 500;\n}\n\n/* Inputs outside tables */\n.field {\n  display: flex;\n  flex-direction: column;\n  gap: 4px;\n}\n.field label {\n  font-family: var(--f-mono);\n  font-size: 10px;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n}\n.field input, .field select {\n  border: 1px solid var(--rule-strong);\n  background: var(--paper);\n  padding: 9px 11px;\n  font: inherit;\n  color: var(--ink);\n  outline: none;\n  border-radius: 0;\n}\n.field input:focus, .field select:focus {\n  border-color: var(--brand);\n  background: oklch(0.99 0.015 30);\n}\n.field input.num { font-family: var(--f-mono); font-variant-numeric: tabular-nums; text-align: right; }\n\n/* ============ Summary card (totals panel) ============ */\n.summary-panel {\n  border: 1px solid var(--rule-strong);\n  background: var(--paper-2);\n  padding: 20px;\n  position: sticky; top: 80px;\n}\n.summary-panel h3 {\n  font-family: var(--f-mono);\n  font-size: 10px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  margin: 0 0 16px 0;\n  color: var(--ink-3);\n}\n.summary-row {\n  display: flex; justify-content: space-between; align-items: baseline;\n  padding: 8px 0;\n  border-bottom: 1px dashed var(--rule);\n  font-size: 14px;\n}\n.summary-row:last-of-type { border-bottom: none; }\n.summary-row .label { color: var(--ink-2); }\n.summary-row .val {\n  font-family: var(--f-mono);\n  font-variant-numeric: tabular-nums;\n  font-weight: 500;\n}\n.summary-row.hero {\n  padding: 14px 0;\n  margin-top: 8px;\n  border-top: 2px solid var(--ink);\n  border-bottom: none;\n}\n.summary-row.hero .label {\n  font-family: var(--f-serif);\n  font-size: 18px;\n  color: var(--ink);\n}\n.summary-row.hero .val {\n  font-family: var(--f-serif);\n  font-size: 28px;\n  font-weight: 400;\n  letter-spacing: -0.01em;\n}\n\n/* Status chips */\n.chip {\n  display: inline-flex; align-items: center; gap: 6px;\n  font-family: var(--f-mono);\n  font-size: 10px;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  padding: 3px 8px;\n  border: 1px solid;\n}\n.chip.good { color: var(--green); border-color: var(--green); background: var(--green-soft); }\n.chip.warn { color: var(--amber); border-color: var(--amber); background: var(--amber-soft); }\n.chip.bad { color: var(--terra); border-color: var(--terra); background: var(--terra-soft); }\n.chip.neutral { color: var(--ink-2); border-color: var(--rule-strong); background: var(--paper); }\n\n/* Checkbox grid for allergens */\n.checkbox-tick {\n  appearance: none;\n  width: 20px; height: 20px;\n  border: 1.5px solid var(--rule-strong);\n  background: var(--paper);\n  cursor: pointer;\n  display: inline-grid; place-items: center;\n  transition: all 0.1s;\n  margin: 0;\n}\n.checkbox-tick:hover { border-color: var(--ink); }\n.checkbox-tick:checked {\n  background: var(--ink);\n  border-color: var(--ink);\n}\n.checkbox-tick:checked::after {\n  content: '';\n  width: 10px; height: ;\n}\n.tweak-row input[type=range] { width: 100%; accent-color: var(--ink); }\n.tweak-row .toggle {\n  display: flex; align-items: center; justify-content: space-between;\n  font-size: 13px;\n}\n.switch {\n  width: 36px; height: 20px;\n  background: var(--paper-3);\n  border: 1px solid var(--rule-strong);\n  border-radius: 999px;\n  position: relative; cursor: pointer;\n  transition: all 0.15s;\n}\n.switch::after {\n  content: '';\n  width: 14px; height: 14px;\n  background: var(--paper);\n  border: 1px solid var(--rule-strong);\n  border-radius: 50%;\n  position: absolute;\n  top: 2px; left: 2px;\n  transition: all 0.15s;\n}\n.switch.on { background: var(--ink); border-color: var(--ink); }\n.switch.on::after { left: 18px; border-color: var(--ink); }\n\n/* Divider stamp */\n.stamp {\n  display: inline-block;\n  border: 1.5px solid var(--terra);\n  color: var(--terra);\n  padding: 4px 10px;\n  font-family: var(--f-mono);\n  font-size: 10px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  transform: rotate(-2deg);\n}\n\n/* Empty row add button */\n.add-row-btn {\n  width: 100%;\n  background: transparent;\n  border: 1px dashed var(--rule-strong);\n  color: var(--ink-2);\n  padding: 10px;\n  font-family: var(--f-mono);\n  font-size: 12px;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  cursor: pointer;\n  margin-top: 6px;\n}\n.add-row-btn:hover { border-color: var(--ink); color: var(--ink); background: var(--paper-2); }\n\n/* Delete row button */\n.del-row {\n  background: none; border: 0;\n  color: var(--ink-3);\n  cursor: pointer;\n  padding: 8px;\n  font-size: 16px;\n  font-family: var(--f-mono);\n  line-height: 1;\n}\n.del-row:hover { color: var(--terra); }\n\n/* Print */\n.print-mark { display: none; }\n@media print {\n  .topbar, .margin-col, .ws-actions, .tweaks, .modal-backdrop, .btn-primary, .btn-ghost, .add-row-btn, .del-row { display: none !important; }\n  .tool-page { grid-template-columns: 1fr; }\n  .workspace { padding: 0; }\n  body.ledger { background: white; }\n\n  /* Subtle publisher mark in bottom-right of every printed page */\n  .print-mark {\n    display: flex !important;\n    position: fixed;\n    bottom: 8mm;\n    right: 12mm;\n    align-items: center;\n    gap: 8px;\n    opacity: 0.55;\n  }\n  .print-mark img {\n    height: 18px;\n    width: auto;\n    display: block;\n  }\n  .print-mark .print-mark-url {\n    font-family: 'JetBrains Mono', ui-monospace, monospace;\n    font-size: 8.5pt;\n    color: var(--ink, #1a1613);\n    letter-spacing: 0.02em;\n  }\n  @page {\n    margin: 14mm 14mm 22mm 14mm;\n  }\n}\n<\u002Fstyle>\n<style>\n  .pc-layout {\n    display: grid;\n    grid-template-columns: 1fr 320px;\n    gap: 32px;\n    align-items: start;\n  }\n  @media (max-width: 1100px) { .pc-layout { grid-template-columns: 1fr; } }\n\n  .dish-head {\n    display: grid;\n    grid-template-columns: 2fr 1fr 1fr 1fr;\n    gap: 14px;\n    margin-bottom: 28px;\n    padding-bottom: 20px;\n    border-bottom: 1px solid var(--rule);\n  }\n  @media (max-width: 700px) { .dish-head { grid-template-columns: 1fr 1fr; } }\n\n  .pc-table {\n    width: 100%;\n    border-collapse: collapse;\n    font-size: 13px;\n  }\n  .pc-table th {\n    font-family: var(--f-mono);\n    font-weight: 500;\n    font-size: 10px;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    color: var(--ink-3);\n    text-align: left;\n    padding: 8px 8px;\n    border-bottom: 1px solid var(--rule-strong);\n  }\n  .pc-table th.num { text-align: right; }\n  .pc-table td { padding: 0; border-bottom: 1px solid var(--rule); }\n  .pc-table tr:hover td { background: oklch(0.97 0.01 85 / 0.5); }\n  .pc-table input, .pc-table select {\n    width: 100%;\n    border: 0; background: transparent;\n    padding: 10px 8px;\n    font: inherit;\n    color: var(--ink);\n    outline: none;\n  }\n  .pc-table input.num {\n    font-family: var(--f-mono);\n    font-variant-numeric: tabular-nums;\n    text-align: right;\n  }\n  .pc-table input:focus, .pc-table select:focus {\n    background: oklch(0.98 0.03 90);\n    box-shadow: inset 0 -2px 0 var(--ink);\n  }\n  .pc-table tfoot td {\n    border-top: 2px solid var(--ink);\n    padding: 12px 8px;\n    font-family: var(--f-mono);\n    font-variant-numeric: tabular-nums;\n    font-size: 13px;\n    color: var(--ink-2);\n  }\n  .pc-table tfoot td.total {\n    font-weight: 600;\n    font-size: 15px;\n    color: var(--ink);\n  }\n  .w-yield { width: 100px; }\n  .w-del { width: 44px; }\n  .w-qty { width: 100px; }\n  .w-unit { width: 80px; }\n  .w-cost { width: 110px; }\n  .w-line { width: 110px; }\n\n  .verdict {\n    padding: 16px;\n    border: 1px solid;\n    margin-top: 14px;\n    font-size: 13px;\n    line-height: 1.5;\n  }\n  .verdict.good { border-color: var(--green); background: var(--green-soft); color: oklch(0.32 0.06 155); }\n  .verdict.warn { border-color: var(--amber); background: var(--amber-soft); color: oklch(0.38 0.09 60); }\n  .verdict.bad { border-color: var(--terra); background: var(--terra-soft); color: oklch(0.36 0.09 35); }\n\n  .line-muted { color: var(--ink-3); font-size: 12px; font-family: var(--f-mono); }\n\n  .target-bar {\n    margin-top: 20px;\n    padding-top: 14px;\n    border-top: 1px dashed var(--rule);\n  }\n  .target-label {\n    display: flex; justify-content: space-between;\n    font-family: var(--f-mono);\n    font-size: 10px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--ink-3);\n    margin-bottom: 8px;\n  }\n  .bar-track {\n    height: 10px; background: var(--paper-3);\n    position: relative;\n    border: 1px solid var(--rule);\n  }\n  .bar-fill {\n    position: absolute; left: 0; top: 0; bottom: 0;\n    background: var(--ink);\n    transition: width 0.3s, background 0.3s;\n  }\n  .bar-fill.good { background: var(--green); }\n  .bar-fill.warn { background: var(--amber); }\n  .bar-fill.bad { background: var(--terra); }\n  .target-mark {\n    position: absolute; top: -4px; bottom: -4px;\n    width: 2px; background: var(--ink);\n  }\n\n  .category-select {\n    font-family: var(--f-mono);\n    font-size: 11px;\n    color: var(--ink-2);\n  }\n<\u002Fstyle>\n\n<\u002Fhead>\n<body class=\"ledger\">\n<img data-syn-logo=\"\" src=\"a2281a95-4c5d-4060-9af8-d89441886d32\" alt=\"\" style=\"display:none\">\n<script src=\"854cc1c1-4ab3-442b-ad6f-1419c3e4137c\"><\u002Fscript>\n<script>SYN.mountTopbar('portion');<\u002Fscript>\n\n<main class=\"page\">\n  <div class=\"tool-page\">\n    <aside class=\"margin-col\">\n      <div class=\"eyebrow\">Tool 01 · Back-of-house<\u002Fdiv>\n      <h1>Portion cost <em>calculator.<\u002Fem><\u002Fh1>\n      <p class=\"lede\">Build up the real cost of a dish, ingredient by ingredient — <strong>including yield and trim waste<\u002Fstrong> — then compare to your selling price to see GP%, contribution and a verdict against your target margin.<\u002Fp>\n\n      <div class=\"margin-note\">\n        <strong>Yield %<\u002Fstrong>\n        The usable portion of a raw ingredient after trim, peeling or shrinkage. A whole beef fillet at 85% yield means you're paying for 15% waste. We divide your unit cost by yield to get the true cost.\n      <\u002Fdiv>\n      <div class=\"margin-note\">\n        <strong>Target GP%<\u002Fstrong>\n        Industry benchmark: <strong>65–70%<\u002Fstrong> for food, <strong>75%+<\u002Fstrong> for bar. Adjust via the Tweaks panel — the verdict updates live.\n      <\u002Fdiv>\n      <div class=\"margin-note\">\n        <strong>Formula<\u002Fstrong>\n        <span class=\"line-muted\">Line cost = (qty × unit cost) ÷ yield%<br>GP% = (price − cost) ÷ price × 100<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Faside>\n\n    <section class=\"workspace\">\n      <div class=\"workspace-header\">\n        <div class=\"workspace-title\">Worksheet · Recipe costing<\u002Fdiv>\n        <div class=\"ws-actions\">\n          <button class=\"btn-ghost\" onclick=\"window.print()\">⎙ Print<\u002Fbutton>\n          <button class=\"btn-ghost\" onclick=\"SYN.openLead({reason:'export'})\">✉ Email PDF<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"dish-head\">\n        <div class=\"field\">\n          <label>Dish name<\u002Flabel>\n          <input type=\"text\" id=\"dish-name\" value=\"Pan-fried hake, lemon butter, crushed potatoes\">\n        <\u002Fdiv>\n        <div class=\"field\">\n          <label>Category<\u002Flabel>\n          <select id=\"category\" class=\"category-select\">\n            <option value=\"main\">Main<\u002Foption>\n            <option value=\"starter\">Starter<\u002Foption>\n            <option value=\"side\">Side<\u002Foption>\n            <option value=\"dessert\">Dessert<\u002Foption>\n            <option value=\"drink\">Drink / Cocktail<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n        <div class=\"field\">\n          <label>Yield (portions)<\u002Flabel>\n          <input type=\"number\" id=\"portions\" class=\"num\" value=\"1\" min=\"1\" step=\"1\">\n        <\u002Fdiv>\n        <div class=\"field\">\n          <label>Menu price (ex VAT) €<\u002Flabel>\n          <input type=\"number\" id=\"menu-price\" class=\"num\" value=\"24.50\" step=\"0.10\" min=\"0\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"pc-layout\">\n        <div>\n          <table class=\"pc-table\" id=\"ingredients\">\n            <thead>\n              <tr>\n                <th>Ingredient<\u002Fth>\n                <th class=\"num w-qty\">Qty<\u002Fth>\n                <th class=\"w-unit\">Unit<\u002Fth>\n                <th class=\"num w-cost\">Cost / unit<\u002Fth>\n                <th class=\"num w-yield\">Yield %<\u002Fth>\n                <th class=\"num w-line\">Line cost<\u002Fth>\n                <th class=\"w-del\"><\u002Fth>\n              <\u002Ftr>\n            <\u002Fthead>\n            <tbody><\u002Ftbody>\n            <tfoot>\n              <tr>\n                <td colspan=\"5\" style=\"text-align:right;\">Sub-total ingredients<\u002Ftd>\n                <td class=\"num\" id=\"subtotal\">€0.00<\u002Ftd>\n                <td><\u002Ftd>\n              <\u002Ftr>\n              <tr>\n                <td colspan=\"5\" style=\"text-align:right; color:var(--ink-3);\">+ Garnish &amp; sundries (3%)<\u002Ftd>\n                <td class=\"num\" id=\"sundries\">€0.00<\u002Ftd>\n                <td><\u002Ftd>\n              <\u002Ftr>\n              <tr>\n                <td colspan=\"5\" style=\"text-align:right;\" class=\"total\">Food cost per portion<\u002Ftd>\n                <td class=\"num total\" id=\"food-cost\">€0.00<\u002Ftd>\n                <td><\u002Ftd>\n              <\u002Ftr>\n            <\u002Ftfoot>\n          <\u002Ftable>\n          <button class=\"add-row-btn\" id=\"add-ing\">+ Add ingredient<\u002Fbutton>\n        <\u002Fdiv>\n\n        <aside class=\"summary-panel\">\n          <h3>Portion summary<\u002Fh3>\n\n          <div class=\"summary-row\">\n            <span class=\"label\">Menu price (ex VAT)<\u002Fspan>\n            <span class=\"val\" id=\"s-price\">€0.00<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"summary-row\" data-vat-row=\"\" style=\"display:none;\">\n            <span class=\"label\">+ VAT (13.5%)<\u002Fspan>\n            <span class=\"val\" id=\"s-vat\">€0.00<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"summary-row\" data-vat-row=\"\" style=\"display:none;\">\n            <span class=\"label\">Gross price (inc VAT)<\u002Fspan>\n            <span class=\"val\" id=\"s-gross\">€0.00<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"summary-row\">\n            <span class=\"label\">Food cost<\u002Fspan>\n            <span class=\"val\" id=\"s-cost\">€0.00<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"summary-row\">\n            <span class=\"label\">Cost %<\u002Fspan>\n            <span class=\"val\" id=\"s-costpct\">—%<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"summary-row\">\n            <span class=\"label\">Gross profit (€)<\u002Fspan>\n            <span class=\"val\" id=\"s-gp\">€0.00<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"summary-row hero\">\n            <span class=\"label\">Gross Profit<\u002Fspan>\n            <span class=\"val\" id=\"s-gppct\" style=\"color:var(--green)\">—%<\u002Fspan>\n          <\u002Fdiv>\n\n          <div class=\"target-bar\">\n            <div class=\"target-label\">\n              <span>GP vs Target<\u002Fspan>\n              <span id=\"target-readout\" class=\"val\">Target 70%<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"bar-track\">\n              <div class=\"bar-fill\" id=\"bar-fill\" style=\"width: 0%\"><\u002Fdiv>\n              <div class=\"target-mark\" id=\"target-mark\" style=\"left: 70%;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"verdict\" id=\"verdict\">Type in your ingredients to see the verdict.<\u002Fdiv>\n        <\u002Faside>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:40px; padding-top: 20px; border-top: 1px solid var(--rule); display:flex; justify-content:space-between; color: var(--ink-3); font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.08em;\">\n        <span data-syn-footer=\"\">Generated with Synergy Toolkit · synergystocktaking.co.uk<\u002Fspan>\n        <span id=\"timestamp\"><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n<\u002Fmain>\n\n<script>\n  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n    \"targetGP\": 70,\n    \"showVAT\": false\n  }/*EDITMODE-END*/;\n  let settings = { ...TWEAK_DEFAULTS };\n\n  let ingredients = [\n    { name: 'Fresh hake fillet', qty: 180, unit: 'g', cost: 0.035, yield: 85 },\n    { name: 'Butter, Irish', qty: 30, unit: 'g', cost: 0.009, yield: 100 },\n    { name: 'Lemon', qty: 0.25, unit: 'each', cost: 0.45, yield: 60 },\n    { name: 'Baby potatoes', qty: 220, unit: 'g', cost: 0.0025, yield: 92 },\n    { name: 'Flat-leaf parsley', qty: 5, unit: 'g', cost: 0.04, yield: 70 },\n    { name: 'Olive oil', qty: 10, unit: 'ml', cost: 0.008, yield: 100 },\n    { name: 'Sea salt & pepper', qty: 2, unit: 'g', cost: 0.005, yield: 100 }\n  ];\n\n  const UNITS = ['g', 'kg', 'ml', 'L', 'each', 'oz'];\n\n  const render = () => {\n    const tbody = document.querySelector('#ingredients tbody');\n    tbody.innerHTML = '';\n    ingredients.forEach((ing, i) => {\n      const yieldPct = Math.max(1, Math.min(100, ing.yield || 100));\n      const lineCost = (ing.qty * ing.cost) / (yieldPct / 100);\n      const tr = document.createElement('tr');\n      tr.innerHTML = `\n        <td><input type=\"text\" data-f=\"name\" data-i=\"${i}\" value=\"${(ing.name||'').replace(/\"/g, '&quot;')}\" placeholder=\"e.g. Chicken thigh\" /><\u002Ftd>\n        <td><input type=\"number\" class=\"num\" data-f=\"qty\" data-i=\"${i}\" value=\"${ing.qty}\" step=\"0.1\" min=\"0\" /><\u002Ftd>\n        <td>\n          <select data-f=\"unit\" data-i=\"${i}\">\n            ${UNITS.map(u => `<option ${u===ing.unit?'selected':''}>${u}<\u002Foption>`).join('')}\n          <\u002Fselect>\n        <\u002Ftd>\n        <td><input type=\"number\" class=\"num\" data-f=\"cost\" data-i=\"${i}\" value=\"${ing.cost}\" step=\"0.001\" min=\"0\" /><\u002Ftd>\n        <td><input type=\"number\" class=\"num\" data-f=\"yield\" data-i=\"${i}\" value=\"${ing.yield}\" step=\"1\" min=\"1\" max=\"100\" /><\u002Ftd>\n        <td class=\"num\" style=\"padding: 10px 8px; font-family: var(--f-mono); font-variant-numeric: tabular-nums;\">€${lineCost.toFixed(2)}<\u002Ftd>\n        <td class=\"w-del\"><button class=\"del-row\" data-del=\"${i}\">×<\u002Fbutton><\u002Ftd>\n      `;\n      tbody.appendChild(tr);\n    });\n\n    tbody.querySelectorAll('input, select').forEach(el => {\n      el.addEventListener('input', () => {\n        const i = +el.dataset.i;\n        const f = el.dataset.f;\n        if (f === 'name' || f === 'unit') ingredients[i][f] = el.value;\n        else ingredients[i][f] = parseFloat(el.value) || 0;\n        // Only patch the line-cost cell — do NOT re-render rows (would kill focus while typing)\n        const ing = ingredients[i];\n        const lc = (ing.yield > 0) ? ing.qty * ing.cost * (100 / ing.yield) : 0;\n        const lcCell = el.closest('tr').querySelector('td.num[style]');\n        if (lcCell) lcCell.textContent = '€' + lc.toFixed(2);\n        compute();\n      });\n    });\n    tbody.querySelectorAll('[data-del]').forEach(b => {\n      b.addEventListener('click', () => { ingredients.splice(+b.dataset.del, 1); render(); compute(); });\n    });\n  };\n\n  const compute = () => {\n    const portions = Math.max(1, parseFloat(document.getElementById('portions').value) || 1);\n    const price = parseFloat(document.getElementById('menu-price').value) || 0;\n\n    let subtotal = 0;\n    ingredients.forEach(ing => {\n      const y = Math.max(1, Math.min(100, ing.yield || 100));\n      subtotal += (ing.qty * ing.cost) / (y / 100);\n    });\n    const sundries = subtotal * 0.03;\n    const perPortionCost = (subtotal + sundries) / portions;\n\n    document.getElementById('subtotal').textContent = SYN.fmtEUR(subtotal / portions);\n    document.getElementById('sundries').textContent = SYN.fmtEUR(sundries / portions);\n    document.getElementById('food-cost').textContent = SYN.fmtEUR(perPortionCost);\n\n    const gp = price - perPortionCost;\n    const gpPct = price > 0 ? (gp / price) * 100 : 0;\n    const costPct = price > 0 ? (perPortionCost / price) * 100 : 0;\n\n    document.getElementById('s-price').textContent = SYN.fmtEUR(price);\n    document.getElementById('s-cost').textContent = SYN.fmtEUR(perPortionCost);\n    document.getElementById('s-costpct').textContent = SYN.fmtPct(costPct);\n    document.getElementById('s-gp').textContent = SYN.fmtEUR(gp);\n    document.getElementById('s-gppct').textContent = SYN.fmtPct(gpPct);\n\n    // VAT display (food = 13.5% in Ireland)\n    document.querySelectorAll('[data-vat-row]').forEach(el => {\n      el.style.display = settings.showVAT ? 'flex' : 'none';\n    });\n    if (settings.showVAT) {\n      const vatRate = 0.135;\n      document.getElementById('s-vat').textContent = SYN.fmtEUR(price * vatRate);\n      document.getElementById('s-gross').textContent = SYN.fmtEUR(price * (1 + vatRate));\n    }\n\n    // GP color vs target\n    const target = settings.targetGP;\n    const bar = document.getElementById('bar-fill');\n    bar.style.width = Math.max(0, Math.min(100, gpPct)) + '%';\n    const verdict = document.getElementById('verdict');\n    const gpEl = document.getElementById('s-gppct');\n    let cls = 'good';\n    if (gpPct < target - 10) cls = 'bad';\n    else if (gpPct < target) cls = 'warn';\n    bar.className = 'bar-fill ' + cls;\n    gpEl.style.color = cls === 'good' ? 'var(--green)' : cls === 'warn' ? 'var(--amber)' : 'var(--terra)';\n\n    document.getElementById('target-readout').textContent = `Target ${target}%`;\n    document.getElementById('target-mark').style.left = target + '%';\n\n    if (price <= 0 || perPortionCost <= 0) {\n      verdict.className = 'verdict';\n      verdict.innerHTML = '<strong>Enter a price and ingredients<\u002Fstrong> to see your margin verdict.';\n    } else if (cls === 'good') {\n      verdict.className = 'verdict good';\n      verdict.innerHTML = `<strong>On target.<\u002Fstrong> At ${gpPct.toFixed(1)}% GP you're ${(gpPct-target).toFixed(1)} points above your ${target}% target. Dish earns €${gp.toFixed(2)} gross profit per plate.`;\n    } else if (cls === 'warn') {\n      const priceNeeded = perPortionCost / (1 - target/100);\n      verdict.className = 'verdict warn';\n      verdict.innerHTML = `<strong>Under target.<\u002Fstrong> You're ${(target-gpPct).toFixed(1)} points below ${target}%. Raise price to <strong>€${priceNeeded.toFixed(2)}<\u002Fstrong> or trim costs by ${SYN.fmtEUR(perPortionCost - price*(1-target/100))} to hit it.`;\n    } else {\n      const priceNeeded = perPortionCost / (1 - target/100);\n      verdict.className = 'verdict bad';\n      verdict.innerHTML = `<strong>Well below target.<\u002Fstrong> Only ${gpPct.toFixed(1)}% GP — dish is over-costed or under-priced. Suggested price: <strong>€${priceNeeded.toFixed(2)}<\u002Fstrong>.`;\n    }\n  };\n\n  document.getElementById('portions').addEventListener('input', compute);\n  document.getElementById('menu-price').addEventListener('input', compute);\n  document.getElementById('add-ing').addEventListener('click', () => {\n    ingredients.push({ name: '', qty: 0, unit: 'g', cost: 0, yield: 100 });\n    render(); compute();\n    const inputs = document.querySelectorAll('#ingredients tbody [data-f=\"name\"]');\n    inputs[inputs.length - 1].focus();\n  });\n\n  document.getElementById('timestamp').textContent = 'Worksheet · ' + new Date().toLocaleDateString('en-IE', { year:'numeric', month:'short', day:'numeric' });\n\n  render();\n  compute();\n\n  // Tweaks\n  SYN.mountTweaks({\n    rows: [\n      { type: 'slider', key: 'targetGP', label: 'Target GP%', value: settings.targetGP, min: 40, max: 90, step: 1,\n        format: v => v + '%',\n        onChange: v => { settings.targetGP = v; compute(); } },\n      { type: 'toggle', key: 'showVAT', label: 'Show VAT (13.5%)', value: settings.showVAT,\n        onChange: v => { settings.showVAT = v; compute(); } }\n    ]\n  });\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
